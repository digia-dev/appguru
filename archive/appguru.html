        async function renderStudentDetailModal(student) {
            console.log('Rendering student detail modal for:', student);
            
            try {
                const studentData = allStudentsCache.get(student.student_id) || { grades: {} };
                
                const attendanceSnap = await db.collection('attendance').where('student_id', '==', student.student_id).get();
                
                // Define academic year boundaries for attendance calculation
                // Assuming current academic year is 2025/2026
                const ganjilStart = new Date('2025-07-01');
                const ganjilEnd = new Date('2025-12-31');
                const genapStart = new Date('2026-01-01');
                const genapEnd = new Date('2026-06-30');

                const ganjilSummary = { H: 0, S: 0, I: 0, A: 0 };
                const genapSummary = { H: 0, S: 0, I: 0, A: 0 };

                attendanceSnap.forEach(doc => {
                    const data = doc.data();
                    const eventDate = new Date(data.event_date);
                    const status = data.keterangan;

                    if (eventDate >= ganjilStart && eventDate <= ganjilEnd) {
                        if (ganjilSummary.hasOwnProperty(status)) ganjilSummary[status]++;
                    } else if (eventDate >= genapStart && eventDate <= genapEnd) {
                        if (genapSummary.hasOwnProperty(status)) genapSummary[status]++;

                const title = `<i class="fas fa-user-circle mr-2"></i> Detail Siswa - ${student.name}`;

        function getUpcomingCalendarEvents(limit) {
            const upcoming = [];
            const today = new Date(getTodayDateString());
            today.setHours(0,0,0,0); // Normalize to start of day

            calendarDataMap.forEach((eventInfo, dateString) => {
                const eventDate = new Date(dateString);
                eventDate.setHours(0,0,0,0); // Normalize to start of day
                if (eventDate >= today) { // Only future or today's events
                    upcoming.push({ date: dateString, ...eventInfo });
                }
            });
            upcoming.sort((a,b) => new Date(a.date) - new Date(b.date));
            return upcoming.slice(0, limit);
        }

         async function saveAllGrades(buttonElement) {
            if (gradeChanges.size === 0) {
                if (buttonElement) showSuccess("Tidak ada perubahan untuk disimpan.");
                return;
            }

            if (buttonElement) {
                buttonElement.disabled = true;
                buttonElement.innerHTML = '<i class="fas fa-spinner fa-spin text-xl"></i>';
            }
            
            const batches = [];
            const batchSize = 400; // Keep under Firestore limit of 500
            let currentBatch = db.batch();
            let operationCount = 0;
            
            const newDocIdsMap = new Map(); // Map to store studentId_semester -> new docId

            for (const [docId, changes] of gradeChanges.entries()) {
                if (operationCount >= batchSize) {
                    batches.push(currentBatch);
                    currentBatch = db.batch();
                    operationCount = 0;
                }
                
                if (docId.startsWith('PENDING_NEW_')) {
                    const newDocRef = db.collection('grades').doc();
                    const studentId = changes.student_id;
                    const semester = changes.semester;

                    const dataToSave = {
                        student_id: studentId,
                        semester: semester,
                        ...changes,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() // Add timestamp
                    };
                    // Remove temporary docId from dataToSave if it was accidentally added
                    delete dataToSave.docId; 
                    currentBatch.set(newDocRef, dataToSave);
                    newDocIdsMap.set(`${studentId}_${semester}`, newDocRef.id);
                    console.log(`Creating new grade doc for ${studentId} (${semester}): ${newDocRef.id}`);
                } else {
                    const docRef = db.collection('grades').doc(docId);
                    currentBatch.update(docRef, changes);
                    console.log(`Updating existing grade doc: ${docId}`);
                }
                operationCount++;
            }
            
            if (operationCount > 0) {
                batches.push(currentBatch);
            }

            try {
                await Promise.all(batches.map(batch => batch.commit()));
                console.log("All grade batches committed successfully.");
                
                // Update allStudentsCache with real docIds for newly created documents
                newDocIdsMap.forEach((realDocId, key) => {
                    const [studentId, semester] = key.split('_');
                    const student = allStudentsCache.get(studentId);
                    if (student && student.grades[semester]) {
                        student.grades[semester].docId = realDocId;
                        console.log(`Updated cache for ${studentId} (${semester}) with new docId: ${realDocId}`);
                    }
                });

                if (buttonElement) showSuccess(`${gradeChanges.size} perubahan nilai berhasil disimpan.`);
                gradeChanges.clear();
                
                // Re-render the current page to reflect the latest data from cache
                if (buttonElement) {
                    const container = buttonElement.closest('#mobile-main, #desktop-main');
                    if (currentPage === 'nilai') await displayGrades(container);
                    if (currentPage === 'penilaian-semester') await displaySemesterGrades(container);
                }

            } catch (e) {
                console.error("Error saving grades:", e);
                if (buttonElement) alert("Gagal menyimpan data nilai.");
                throw e; // Re-throw for auto-save error handling
            } finally {
                if (buttonElement) {
                                        buttonElement.innerHTML = '<i class="fas fa-save text-xl"></i>';
                }
            }
        }

        // === TABLE NAVIGATION ===
        function setupTableNavigation(tableBody) {
            if (!tableBody) return;
            
            tableBody.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.contentEditable === 'true') {
                    const currentCell = e.target.closest('td');
                    const currentRow = currentCell.closest('tr');
                    const allRows = Array.from(tableBody.querySelectorAll('tr'));
                    const allCellsInRow = Array.from(currentRow.querySelectorAll('td'));
                    
                    const currentRowIndex = allRows.indexOf(currentRow);
                    const currentCellIndex = allCellsInRow.indexOf(currentCell);
                    
                    let targetCell = null;
                    
                    switch(e.key) {
                        case 'ArrowUp':
                            if (currentRowIndex > 0) {
                                const targetRow = allRows[currentRowIndex - 1];
                                targetCell = targetRow.querySelectorAll('td')[currentCellIndex];
                            }
                            break;
                        case 'ArrowDown':
                            if (currentRowIndex < allRows.length - 1) {
                                const targetRow = allRows[currentRowIndex + 1];
                                targetCell = targetRow.querySelectorAll('td')[currentCellIndex];
                            }
                            break;
                        case 'ArrowLeft':
                            if (currentCellIndex > 1) { // Skip name column (index 0)
                                targetCell = allCellsInRow[currentCellIndex - 1];
                            }
                            break;
                        case 'ArrowRight':
                        case 'Tab':
                            if (currentCellIndex < allCellsInRow.length - 1) {
                                targetCell = allCellsInRow[currentCellIndex + 1];
                            } else if (currentRowIndex < allRows.length - 1) {
                                // Move to first editable cell of next row
                                const nextRow = allRows[currentRowIndex + 1];
                                targetCell = nextRow.querySelectorAll('td')[1]; // Skip name column
                            }
                            break;
                        case 'Enter':
                            // Move to same column, next row
                            if (currentRowIndex < allRows.length - 1) {
                                const targetRow = allRows[currentRowIndex + 1];
                                targetCell = targetRow.querySelectorAll('td')[currentCellIndex];
                            }
                            break;
                    }
                    
                    if (targetCell) {
                        e.preventDefault();
                        const input = targetCell.querySelector('input');
                        if (input) {
                            input.focus();
                            input.select();
                        } else if (targetCell.contentEditable === 'true') {
                            targetCell.focus();
                        }
                    }
                }
            });
        }

        async function saveNewStudent() {
            const studentId = document.getElementById('new-student-id').value.trim();
            const studentName = document.getElementById('new-student-name').value.trim();
            const studentClass = document.getElementById('new-student-class').value;
            
            if (!studentId || !studentName || !studentClass) {
                alert('Semua field wajib diisi!');
                return;
            }

            // Check if student ID already exists
            if (allStudentsCache.has(studentId)) {
                alert('NIS sudah terdaftar! Gunakan NIS yang berbeda.');
                return;
            }

            try {
                const newStudentData = {
                    student_id: studentId,
                    name: studentName,
                    class: studentClass,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                };

                const docRef = await db.collection('students').add(newStudentData);
                
                // Add to cache immediately
                allStudentsCache.set(studentId, {
                    ...newStudentData,
                    docId: docRef.id,
                    grades: { Ganjil: {}, Genap: {} }
                });

                showSuccess('Siswa baru berhasil ditambahkan!');
                closeModal();
                closeMobileModal();
                
                // Refresh current page if it shows student data
                if (currentPage === 'absensi') {
                    const containers = document.querySelectorAll('#mobile-main, #desktop-main');
                    containers.forEach(container => displayStudentsForAttendance(container));
                } else if (currentPage === 'nilai') {
                    const containers = document.querySelectorAll('#mobile-main, #desktop-main');
                    containers.forEach(container => displayGrades(container));
                } else if (currentPage === 'penilaian-semester') {
                    const containers = document.querySelectorAll('#mobile-main, #desktop-main');
                    containers.forEach(container => displaySemesterGrades(container));
                } else if (currentPage === 'data') {
                    const container = document.querySelector('#data-content-container');
                    if (container && container.querySelector('.wali-kelas-table-body')) {
                        displayWaliKelasData(container);
                    }
                    if (container && container.querySelector('.tabungan-table-body')) {
                        displayTabunganData(container);
                    }
                }
                
            } catch (error) {
                console.error('Error adding new student:', error);
                alert('Gagal menambahkan siswa baru: ' + error.message);
            }
        }

        // Make functions available globally for onclick handlers
        window.navigateToPage = navigateToPage;
        window.showStudentDetail = showStudentDetail;
        window.saveAllGrades = saveAllGrades;
        window.saveWaliKelasData = saveWaliKelasData;
        window.saveAllAttendance = saveAllAttendance;
        window.exportGrades = exportGrades;
        window.exportSemesterGrades = exportSemesterGrades;
        window.exportWaliKelasData = exportWaliKelasData;
        window.exportTabungan = exportTabungan;
        window.exportAttendance = exportAttendance;
        window.exportAgenda = exportAgenda;
        window.showAddStudentModal = showAddStudentModal;
        window.saveNewStudent = saveNewStudent;
        window.generateActivityIdeas = generateActivityIdeas;
        window.generateRaporNote = generateRaporNote;
        window.changeWeek = changeWeek;
        window.scrollCalendar = scrollCalendar;
        window.bulkHadir = bulkHadir;
        window.addTimeSlot = addTimeSlot;
        window.duplicateAgendaToNextWeek = duplicateAgendaToNextWeek;
        window.showTabunganTransactionModal = showTabunganTransactionModal;
        window.saveTabunganTransaction = saveTabunganTransaction;
        window.showKasUmumWithdrawalModal = showKasUmumWithdrawalModal;
                window.saveKasUmumWithdrawal = saveKasUmumWithdrawal;
        window.showKasUmumHistoryModal = showKasUmumHistoryModal;
        window.deleteKasUmumWithdrawal = deleteKasUmumWithdrawal;
        window.showStudentTabunganHistoryModal = showStudentTabunganHistoryModal;
        window.deleteTabunganTransaction = deleteTabunganTransaction;
        window.uploadMateri = uploadMateri;
        window.deleteMateri = deleteMateri;
        window.handleGradeInput = handleGradeInput;
        window.closeModal = closeModal;
        window.closeMobileModal = closeMobileModal;
        window.closeMobileNotification = closeMobileNotification;

        // === PERFORMANCE MONITORING ===
        function logPerformance(action, startTime) {
            const endTime = performance.now();
            const duration = endTime - startTime;
            console.log(`Performance: ${action} took ${duration.toFixed(2)}ms`);
            
            if (duration > 1000) {
                console.warn(`Slow operation detected: ${action} took ${duration.toFixed(2)}ms`);
            }
        }

        // === ERROR HANDLING ===
        window.addEventListener('error', (event) => {
            console.error('Global error caught:', event.error);
            // You could send this to a logging service in production
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled promise rejection:', event.reason);
            // You could send this to a logging service in production
        });

        // === CLEANUP ===
        window.addEventListener('beforeunload', () => {
            // Clear any pending timeouts
            Object.values(autoSaveTimeouts).forEach(timeout => {
                if (timeout) clearTimeout(timeout);
            });
            
            if (autoSaveInterval) {
                clearInterval(autoSaveInterval);
            }
        });

        // === SERVICE WORKER (Optional for PWA) ===
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('SW registered: ', registration);
                    })
                    .catch((registrationError) => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }

        // === KEYBOARD SHORTCUTS ===
        document.addEventListener('keydown', (e) => {
            // Ctrl/Cmd + S to save
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                const saveButton = document.querySelector('.floating-save-btn');
                if (saveButton && !saveButton.disabled) {
                    saveButton.click();
                }
            }
            
            // Ctrl/Cmd + N to add new (context-dependent)
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                if (currentPage === 'agenda') {
                    window.showAddAgendaModal();
                } else if (currentPage === 'absensi' || currentPage === 'nilai' || currentPage === 'data') {
                    showAddStudentModal();
                }
            }
            
            // Ctrl/Cmd + E to export
            if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
                e.preventDefault();
                const exportButton = document.querySelector('button[onclick*="export"]');
                if (exportButton) {
                    exportButton.click();
                }
            }
        });

        // === THEME SUPPORT (Optional) ===
        function initializeTheme() {
            const savedTheme = localStorage.getItem('app-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('app-theme', newTheme);
        }

        // Initialize theme on load
        initializeTheme();

    </script>
</body>
</html>
